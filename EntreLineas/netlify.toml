[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  # NFT transpila ESM a CJS y rompe los `export default` de los routers de Express.
  node_bundler = "none"
  included_files = ["backend/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
